<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Shadows+Into+Light+Two&display=swap"
      rel="stylesheet"
    />
    <title>To Do List</title>
  </head>
  <body>
    <main class="app">
      <h1>My todo list...</h1>
      <div class="designing">
          <div class="input-header">
            <h1><span id="date"></span></h1>
            <div class="todo-input">
              <input
                type="text"
                id="item"
                placeholder="enter your task..."
              /><button id="enter">Enter</button>
            </div>
          </div>
        
          <div class="to-do-list"></div>
        </div>
        
    </main>

    <script src="script.js"></script>
  </body>
</html>
